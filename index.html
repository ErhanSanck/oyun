<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matematik Testi</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 30px; }
        
        .sticky-header { position: sticky; top: 0; background: white; padding: 15px; border-bottom: 2px solid #eee; z-index: 100; text-align: center; }
        
        .section-title { background: #e8f0fe; color: #1967d2; padding: 10px 20px; border-radius: 8px; margin: 30px 0 15px 0; font-weight: bold; clear: both; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        
        .question-card { border: 1px solid #dadce0; padding: 15px; border-radius: 10px; background: #fff; transition: 0.3s; }
        .question-card.correct { border-color: #28a745; background-color: #d4edda; }
        .question-card.wrong { border-color: #dc3545; background-color: #f8d7da; }
        
        .options { margin-top: 10px; }
        .options label { display: block; cursor: pointer; font-size: 14px; margin-bottom: 5px; }
        
        .controls { text-align: center; margin-top: 40px; padding: 20px; border-top: 2px solid #eee; }
        
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        #check-btn { background-color: #28a745; }
        #check-btn:hover { background-color: #218838; }

        #result-box { margin-top: 20px; font-size: 1.2rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <h2>İnteraktif Toplama Testi</h2>
        <button onclick="generateTest()">Yeni Sorular Oluştur</button>
    </div>

    <div id="test-area">
        <div class="section-title">Toplamı 10'dan Büyük Olanlar</div>
        <div id="greater-group" class="grid"></div>

        <div class="section-title">Toplamı 10'dan Küçük Olanlar</div>
        <div id="less-group" class="grid"></div>
    </div>

    <div class="controls">
        <button id="check-btn" onclick="checkAnswers()">Sonuçları Kontrol Et</button>
        <div id="result-box"></div>
    </div>
</div>

<script>
    let answers = {};

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // Şık oluşturma (Doğru cevabı ve 2 yanlış şıkkı karıştırır)
    function generateOptions(correct) {
        let opts = new Set([correct]);
        while(opts.size < 3) {
            let fake = correct + getRandomInt(-3, 3);
            if(fake > 0 && fake !== correct) opts.add(fake);
        }
        return Array.from(opts).sort((a, b) => a - b);
    }

    function createQuestionHTML(id, a, b) {
        const correct = a + b;
        answers[id] = correct;
        const options = generateOptions(correct);

        let html = `
            <div class="question-card" id="card-${id}">
                <strong>${a} + ${b} = ?</strong>
                <div class="options">
        `;
        
        options.forEach(opt => {
            html += `
                <label>
                    <input type="radio" name="q-${id}" value="${opt}"> ${opt}
                </label>
            `;
        });

        html += `</div></div>`;
        return html;
    }

    function generateTest() {
        const greaterGroup = document.getElementById('greater-group');
        const lessGroup = document.getElementById('less-group');
        const resultBox = document.getElementById('result-box');
        
        greaterGroup.innerHTML = '';
        lessGroup.innerHTML = '';
        resultBox.innerHTML = '';
        answers = {};

        // 50 Adet Toplamı > 10
        let g = 0;
        while(g < 50) {
            let a = getRandomInt(2, 9), b = getRandomInt(2, 9);
            if(a + b > 10) {
                greaterGroup.innerHTML += createQuestionHTML('g'+g, a, b);
                g++;
            }
        }

        // 50 Adet Toplamı < 10
        let l = 0;
        while(l < 50) {
            let a = getRandomInt(2, 7), b = getRandomInt(2, 7);
            if(a + b < 10) {
                lessGroup.innerHTML += createQuestionHTML('l'+l, a, b);
                l++;
            }
        }
    }

    function checkAnswers() {
        let score = 0;
        let total = Object.keys(answers).length;

        for (let id in answers) {
            const card = document.getElementById(`card-${id}`);
            const selected = document.querySelector(`input[name="q-${id}"]:checked`);
            
            card.classList.remove('correct', 'wrong');

            if (selected) {
                if (parseInt(selected.value) === answers[id]) {
                    score++;
                    card.classList.add('correct');
                } else {
                    card.classList.add('wrong');
                }
            } else {
                card.classList.add('wrong'); // İşaretlenmemişse yanlış say
            }
        }

        document.getElementById('result-box').innerHTML = 
            `Sonuç: ${total} soruda ${score} doğru cevap! (%${(score/total*100).toFixed(1)})`;
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    // İlk yükleme
    window.onload = generateTest;
</script>

</body>
</html>
